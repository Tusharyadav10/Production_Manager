<style>
    :root {
        --primary: #4338ca;
        --primary-hover: #3730a3;
        --secondary: #0f172a;
        --text-main: #334155;
        --text-muted: #64748b;
        --bg-light: #f8fafc;
        --white: #ffffff;
        --border: #e2e8f0;
        --radius-md: 0.5rem;
        --radius-lg: 1rem;
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1);
    }

    .admin-page-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 2rem 0;
        animation: fadeIn 0.4s ease-out forwards;
        font-family: system-ui, -apple-system, sans-serif;
    }

    .main-admin-heading {
        color: var(--secondary);
        font-size: 2.25rem;
        font-weight: 700;
        margin: 0 0 2.5rem 0;
        text-align: center;
        letter-spacing: -0.02em;
    }

    .admin-wrapper {
        display: flex;
        justify-content: center;
        width: 100%;
        max-width: 900px;
        margin-bottom: 2rem;
    }

    .admin-container {
        background: var(--white);
        padding: 2.5rem;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
        border: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        width: 100%;
    }

    .admin-container:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
    }

    .admin-container h2 {
        margin-bottom: 0.25rem;
        color: var(--secondary);
        text-align: center;
        font-size: 1.5rem;
        font-weight: 600;
    }

    .admin-container p.sub {
        color: var(--text-muted);
        font-size: 0.95rem;
        margin-bottom: 2rem;
        text-align: center;
    }

    .admin-container form, .control-group {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        max-width: 500px;
        margin: 0 auto;
        width: 100%;
    }

    .admin-container input, .admin-container select {
        width: 100%;
        padding: 0.75rem 1rem;
        margin-bottom: 1.25rem;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--bg-light);
        color: var(--text-main);
        font-size: 0.95rem;
        outline: none;
        transition: all 0.2s ease-in-out;
        box-sizing: border-box;
        font-family: inherit;
    }

    .admin-container input:focus, .admin-container select:focus {
        border-color: var(--primary);
        background: var(--white);
        box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.15);
    }
    
    .admin-container select:disabled {
        background: #e2e8f0;
        cursor: not-allowed;
        color: var(--text-muted);
    }

    .date-filters {
        display: flex;
        flex-direction: row;
        gap: 1rem;
        margin-bottom: 1.25rem;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
        width: 100%;
    }

    .date-input-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    .date-input-wrapper label {
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--text-main);
        margin-bottom: 0.5rem;
    }

    .date-input-wrapper input {
        margin-bottom: 0;
    }

    .filter-actions {
        display: flex;
        gap: 1rem;
        max-width: 500px;
        margin: 0 auto;
        width: 100%;
        align-items: center;
    }

    .filter-actions select {
        margin-bottom: 0;
        flex: 1;
    }

    .admin-container .btn {
        width: 100%;
        padding: 0.875rem 1.5rem;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: var(--radius-md);
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.2s ease-in-out;
        margin-top: 1rem;
    }

    .admin-container .btn:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
        box-shadow: var(--shadow-sm);
    }

    .admin-container .btn-reset {
        background: var(--text-muted);
        margin-top: 0;
        width: auto;
        padding: 0.75rem 1.5rem;
    }

    .admin-container .btn-reset:hover {
        background: var(--text-main);
    }

    .divider {
        margin: 2.5rem 0;
        border: 0;
        border-top: 1px solid var(--border);
    }

    .results-container {
        max-height: 600px;
        overflow-y: auto;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--bg-light);
        padding: 1rem;
        margin-top: 1.5rem;
        display: none;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
        width: 100%;
        box-sizing: border-box;
    }

    details.batch-details {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        overflow: hidden;
        box-shadow: var(--shadow-sm);
    }

    details.batch-details > summary {
        padding: 1rem 1.25rem;
        font-weight: 600;
        color: var(--primary);
        cursor: pointer;
        font-size: 1.05rem;
        background: var(--bg-light);
        border-bottom: 1px solid transparent;
        transition: background 0.2s ease;
    }
    
    details.batch-details[open] > summary {
        border-bottom: 1px solid var(--border);
    }

    details.batch-details > summary:hover {
        background: #e2e8f0;
    }

    .item-list {
        list-style-type: none;
        margin: 0;
        padding: 0;
        background: var(--white);
    }

    .item-list li {
        padding: 0.5rem 1rem 0.5rem 2.5rem;
        font-size: 0.85rem;
        color: var(--text-main);
        border-bottom: 1px dashed var(--border);
        position: relative;
        font-family: monospace;
    }

    .item-list li:before {
        content: "↳";
        position: absolute;
        left: 1.25rem;
        color: var(--text-muted);
    }

    .item-list li:last-child {
        border-bottom: none;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="admin-page-container">
    <h1 class="main-admin-heading">Admin Control Panel</h1>

    <div class="admin-wrapper">
        <div class="admin-container" id="admin-panel-product">
            <h2>Add Product</h2>
            <p class="sub">Register new product SKUs for tracking</p>
            <form id="product-form">
                <input type="number" id="product-id" placeholder="Product ID" required>
                <input type="text" id="product-name" placeholder="Product Name" required>
                <input type="text" id="product-sku" placeholder="Product SKU" required>
                <button type="submit" class="btn">Register Product</button>
            </form>
        </div>
    </div>

    <div class="admin-wrapper">
        <div class="admin-container">
            <h2>Product Batch Lookup</h2>
            <p class="sub">Select a product, apply optional date filters, and select a batch</p>
            
            <div class="control-group">
                <select id="product-selector">
                    <option value="">Loading products...</option>
                </select>
            </div>

            <div class="date-filters">
                <div class="date-input-wrapper">
                    <label for="filter-start-date">From Date</label>
                    <input type="date" id="filter-start-date">
                </div>
                <div class="date-input-wrapper">
                    <label for="filter-end-date">To Date</label>
                    <input type="date" id="filter-end-date">
                </div>
            </div>

            <div class="filter-actions">
                <select id="batch-selector" disabled>
                    <option value="" disabled selected>-- Select a Batch --</option>
                </select>
                <button type="button" id="reset-filters-btn" class="btn btn-reset">Reset</button>
            </div>

            <div id="results-container" class="results-container">
                <!-- Results injected here -->
            </div>
        </div>
    </div>
</div>

<script>
    window.notify = window.notify || function (msg, type = 'info') {
        if (typeof window.showNotification === 'function') {
            window.showNotification(msg, type);
        } else {
            alert(msg);
        }
    };

    const fetchJSON = async (url, options = {}) => {
        try {
            const res = await fetch(url, options);
            if (!res.ok) throw new Error('Network response was not ok');
            return await res.json();
        } catch (err) {
            console.error('Fetch error:', err);
            return null;
        }
    };

    let allBatches = [];

    const productSelector = document.getElementById('product-selector');
    const batchSelector = document.getElementById('batch-selector');
    const startDateInput = document.getElementById('filter-start-date');
    const endDateInput = document.getElementById('filter-end-date');
    const resultsContainer = document.getElementById('results-container');
    const resetBtn = document.getElementById('reset-filters-btn');

    const initializeLookup = async () => {
        const currentUserId = typeof user_id !== 'undefined' ? user_id : (window.user_id || 1);

        const [productsData, batchesData] = await Promise.all([
            fetchJSON('/api/admin/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: currentUserId }),
            }),
            fetchJSON('/api/admin/production_batches', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: currentUserId }),
            })
        ]);

        const products = productsData?.products || [];
        allBatches = batchesData?.batches || [];

        productSelector.innerHTML = '<option value="" disabled selected>-- Select a Product --</option>';

        if (products.length === 0) {
            productSelector.innerHTML = '<option value="" disabled>No products registered yet</option>';
            return;
        }

        products.forEach(p => {
            const option = document.createElement('option');
            option.value = String(p.product_id).trim();
            option.textContent = `${p.product_name} (SKU: ${p.product_sku} | ID: ${p.product_id})`;
            productSelector.appendChild(option);
        });
    };

    const updateBatches = () => {
        const selectedProductId = productSelector.value;
        const startDateVal = startDateInput.value;
        const endDateVal = endDateInput.value;
        
        resultsContainer.style.display = 'none';

        if (!selectedProductId) {
            batchSelector.innerHTML = '<option value="" disabled selected>-- Select a Batch --</option>';
            batchSelector.disabled = true;
            return;
        }

        let filteredBatches = allBatches.filter(b => String(b.product_id).trim() === selectedProductId);

        if (startDateVal) {
            const start = new Date(startDateVal);
            start.setHours(0, 0, 0, 0);
            filteredBatches = filteredBatches.filter(b => b.production_date && new Date(b.production_date) >= start);
        }

        if (endDateVal) {
            const end = new Date(endDateVal);
            end.setHours(23, 59, 59, 999);
            filteredBatches = filteredBatches.filter(b => b.production_date && new Date(b.production_date) <= end);
        }

        batchSelector.innerHTML = '<option value="" disabled selected>-- Select a Batch --</option>';

        if (filteredBatches.length === 0) {
            batchSelector.innerHTML = '<option value="" disabled selected>No batches found for selected criteria</option>';
            batchSelector.disabled = true;
        } else {
            filteredBatches.forEach(b => {
                const dateStr = b.production_date ? new Date(b.production_date).toLocaleDateString() : 'Unknown Date';
                const option = document.createElement('option');
                option.value = String(b.batch_id).trim();
                option.textContent = `Batch ID: ${b.batch_id} | Qty: ${b.quantity} | Date: ${dateStr}`;
                batchSelector.appendChild(option);
            });
            batchSelector.disabled = false;
        }
    };

    const renderSelectedBatch = () => {
        const selectedBatchId = batchSelector.value;
        
        if (!selectedBatchId) {
            resultsContainer.style.display = 'none';
            return;
        }

        const batch = allBatches.find(b => String(b.batch_id).trim() === selectedBatchId);

        if (!batch) {
            resultsContainer.style.display = 'none';
            return;
        }

        resultsContainer.style.display = 'block';
        const dateStr = batch.production_date ? new Date(batch.production_date).toLocaleDateString() : 'Unknown Date';
        
        let html = `
            <details class="batch-details" open>
                <summary>🏭 Batch: ${batch.batch_id} &nbsp;|&nbsp; Quantity: ${batch.quantity} &nbsp;|&nbsp; Date: ${dateStr}</summary>
                <ul class="item-list">
        `;
        
        const qty = parseInt(batch.quantity, 10) || 0;
        if (qty > 0) {
            for(let i = 1; i <= qty; i++) {
                html += `<li>Item ID: ${batch.batch_id}-${i}</li>`;
            }
        } else {
            html += `<li>No items in this batch.</li>`;
        }
        
        html += `
                </ul>
            </details>
        `;

        resultsContainer.innerHTML = html;
    };

    const resetFilters = () => {
        productSelector.value = "";
        startDateInput.value = "";
        endDateInput.value = "";
        batchSelector.innerHTML = '<option value="" disabled selected>-- Select a Batch --</option>';
        batchSelector.disabled = true;
        resultsContainer.style.display = 'none';
        resultsContainer.innerHTML = '';
    };

    productSelector.addEventListener('change', updateBatches);
    startDateInput.addEventListener('change', updateBatches);
    endDateInput.addEventListener('change', updateBatches);
    batchSelector.addEventListener('change', renderSelectedBatch);
    resetBtn.addEventListener('click', resetFilters);

    document.getElementById('product-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const btn = this.querySelector('button');
        const originalText = btn.innerText;
        btn.innerText = 'Registering...';
        btn.disabled = true;

        const currentUserId = typeof user_id !== 'undefined' ? user_id : (window.user_id || 1);

        const payload = {
            user_id: currentUserId,
            product_id: document.getElementById('product-id').value,
            product_name: document.getElementById('product-name').value,
            product_sku: document.getElementById('product-sku').value
        };

        const res = await fetch('/api/admin/add_products', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            window.notify('Product SKU registered successfully.', 'success');
            this.reset();
            resetFilters();
            initializeLookup(); 
        } else {
            window.notify('Connection error. Please try again.', 'error');
        }
        
        btn.innerText = originalText;
        btn.disabled = false;
    });

    initializeLookup();
</script>
